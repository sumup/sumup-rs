name: Bug report
description: Report a problem in the SumUp Rust SDK.
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug.
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Describe the problem and what you expected to happen.
      placeholder: A clear and concise description of the bug.
    validations:
      required: true
  - type: textarea
    id: code
    attributes:
      label: Relevant code or error output
      description: Paste a minimal code sample, panic output, or logs if available.
      render: rust
  - type: input
    id: sdk-version
    attributes:
      label: SDK version
      placeholder: e.g. 0.9.0
    validations:
      required: true
  - type: input
    id: rust-version
    attributes:
      label: Rust version
      placeholder: e.g. 1.87.0
  - type: input
    id: os
    attributes:
      label: Operating system
      placeholder: e.g. macOS 15.5, Ubuntu 24.04
  - type: textarea
    id: additional-context
    attributes:
      label: Additional context
      description: Add any other context about the problem here.
